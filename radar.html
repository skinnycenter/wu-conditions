<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RainViewer Radar — Saratoga Springs, NY</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body { margin:0; padding:0; height:100%; background:#0a0a0a; font-family:-apple-system,system-ui,sans-serif; color:#fff; }
  #map { position:absolute; inset:0; }
  .timestamp {
    position:absolute; left:10px; bottom:10px; z-index:1000;
    background:rgba(0,0,0,0.65); color:#fff;
    padding:6px 10px; border-radius:6px;
    font-size:14px; letter-spacing:0.04em;
    pointer-events:none;
  }
  .leaflet-control-attribution { display:none; }
  .leaflet-control-zoom { display:none; }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="timestamp" id="timestamp">Loading radar…</div>

<script>
/* ============================================================
   RainViewer animated radar — centered on Saratoga Springs, NY
   FIX: RainViewer free public API only serves radar tiles up to
   zoom 7. If MAP_ZOOM > 7, the base map renders but radar shows
   nothing — that's what caused the "timestamp moves but no rain"
   issue. We now cap at 7.
   ============================================================ */

const CENTER     = [43.083, -73.785]; // Saratoga Springs, NY
const MAP_ZOOM   = 7;                  // keep at 7 (RainViewer max)
const FRAME_MS   = 500;                // animation interval
const REFRESH_MS = 5 * 60 * 1000;      // re-fetch every 5 min
const TILE_SIZE  = 256;
const RADAR_OPACITY = 0.75;
const COLOR_SCHEME  = 4;               // 2 = Universal Blue

// Base map options — uncomment one:
const BASEMAP_URL = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
// const BASEMAP_URL = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
// const BASEMAP_URL = "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png";

const map = L.map("map", {
  center: CENTER,
  zoom: MAP_ZOOM,
  minZoom: 3,
  maxZoom: 7,
  zoomControl: false,
  attributionControl: false,
  dragging: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  touchZoom: false,
  keyboard: false,
});

L.tileLayer(BASEMAP_URL, { maxZoom: 19 }).addTo(map);

L.circleMarker(CENTER, {
  radius: 6, color: "#fff", weight: 2, fillColor: "#ff5722", fillOpacity: 0.95
}).addTo(map);

let frames = [];
let host = "";
let layers = {};
let position = 0;
let animTimer = null;

function tileUrl(frame) {
  return `${host}${frame.path}/${TILE_SIZE}/{z}/{x}/{y}/${COLOR_SCHEME}/1_1.png`;
}

function preloadLayer(frame) {
  if (layers[frame.time]) return layers[frame.time];
  const layer = L.tileLayer(tileUrl(frame), {
    tileSize: TILE_SIZE,
    opacity: 0,
    zIndex: 100,
  });
  layer.addTo(map);
  layers[frame.time] = layer;
  return layer;
}

function showFrame(idx) {
  const frame = frames[idx];
  if (!frame) return;
  preloadLayer(frame);

  Object.entries(layers).forEach(([t, layer]) => {
    layer.setOpacity(Number(t) === frame.time ? RADAR_OPACITY : 0);
  });

  const ts = new Date(frame.time * 1000);
  const label = ts.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  document.getElementById("timestamp").textContent =
    (frame.isForecast ? "Forecast " : "") + label;
}

function tick() {
  if (!frames.length) return;
  showFrame(position);
  position = (position + 1) % frames.length;
}

async function refresh() {
  try {
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();
    host = data.host;

    const past    = (data.radar?.past    || []).map(f => ({ ...f, isForecast: false }));
    const nowcast = (data.radar?.nowcast || []).map(f => ({ ...f, isForecast: true  }));
    const newFrames = past.concat(nowcast);

    Object.values(layers).forEach(l => map.removeLayer(l));
    layers = {};
    frames = newFrames;
    position = 0;

    frames.forEach(preloadLayer);

    if (animTimer) clearInterval(animTimer);
    tick();
    animTimer = setInterval(tick, FRAME_MS);
  } catch (e) {
    console.error("RainViewer fetch failed:", e);
    document.getElementById("timestamp").textContent = "Radar unavailable";
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
