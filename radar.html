<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RainViewer Radar — Saratoga Springs, NY</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body { margin:0; padding:0; height:100%; background:#0a0a0a; font-family:-apple-system,system-ui,sans-serif; color:#fff; }
  #map { position:absolute; inset:0; }
  .timestamp {
    position:absolute; left:10px; bottom:10px; z-index:1000;
    background:rgba(0,0,0,0.65); color:#fff;
    padding:6px 10px; border-radius:6px;
    font-size:14px; letter-spacing:0.04em;
    pointer-events:none;
  }
  /* Hide Leaflet attribution to keep the view clean on DAKBoard.
     If you want to be courteous to OSM/RainViewer, set display:block. */
  .leaflet-control-attribution { display:none; }
  .leaflet-control-zoom { display:none; }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="timestamp" id="timestamp">Loading radar…</div>

<script>
/* ============================================================
   RainViewer animated radar — centered on Saratoga Springs, NY
   - Pulls latest frame list from RainViewer API every 5 min
   - Plays an animation loop of the last ~2 hours of radar
   - Light base map (CartoDB Positron) so it doesn't feel as dark
     as Windy. Swap BASEMAP_URL to switch styles.
   ============================================================ */

const CENTER     = [43.083, -73.785]; // Saratoga Springs, NY
const ZOOM       = 8;                  // 7 wider, 9 tighter
const FRAME_MS   = 500;                // ms between animation frames
const REFRESH_MS = 5 * 60 * 1000;      // re-fetch API every 5 min

// --- Base map options (pick one by uncommenting) ---
// Light / clean:
const BASEMAP_URL = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
// Dark (matches Windy aesthetic): 
// const BASEMAP_URL = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
// Standard OSM (more colorful):
// const BASEMAP_URL = "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png";

const map = L.map("map", {
  center: CENTER,
  zoom: ZOOM,
  zoomControl: false,
  attributionControl: false,
  dragging: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  touchZoom: false,
  keyboard: false,
});

L.tileLayer(BASEMAP_URL, { maxZoom: 19 }).addTo(map);

// Optional: drop a subtle marker on Saratoga
L.circleMarker(CENTER, {
  radius: 5, color: "#fff", weight: 2, fillColor: "#ff5722", fillOpacity: 0.9
}).addTo(map);

let frames = [];
let host = "";
let layers = {};
let position = 0;
let timer = null;

async function fetchFrames() {
  try {
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();
    host = data.host;
    // Combine past radar + nowcast for a "what's happening + next ~30 min" loop
    const past = data.radar?.past || [];
    const nowcast = data.radar?.nowcast || [];
    frames = past.concat(nowcast);

    // Clear stale layers
    Object.values(layers).forEach(l => map.removeLayer(l));
    layers = {};
    position = 0;

    if (timer) clearInterval(timer);
    timer = setInterval(animate, FRAME_MS);
    animate();
  } catch (e) {
    console.warn("RainViewer fetch failed:", e);
    document.getElementById("timestamp").textContent = "Radar unavailable";
  }
}

function radarTileUrl(frame) {
  // path / size / color / options(smooth_snow)
  // color schemes: 0 BW, 1 original, 2 universal blue, 3 TITAN,
  // 4 weather channel, 5 NEXRAD, 6 rainbow, 7 dark sky, 8 universal red/green
  const colorScheme = 2; // universal blue — reads well on light base
  const size = 256;
  return `${host}${frame.path}/${size}/{z}/{x}/{y}/${colorScheme}/1_1.png`;
}

function showFrame(idx) {
  const frame = frames[idx];
  if (!frame) return;

  if (!layers[frame.time]) {
    layers[frame.time] = L.tileLayer(radarTileUrl(frame), {
      opacity: 0,
      tileSize: 256,
      zIndex: frame.time,
    }).addTo(map);
  }
  // Fade in this frame, fade others out
  Object.entries(layers).forEach(([t, layer]) => {
    layer.setOpacity(parseInt(t, 10) === frame.time ? 0.75 : 0);
  });

  const isNowcast = frames.slice(0, frames.length).indexOf(frame) >=
                    (frames.length - 3); // last few are forecast
  const ts = new Date(frame.time * 1000);
  const label = ts.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  document.getElementById("timestamp").textContent =
    (isNowcast ? "Forecast " : "") + label;
}

function animate() {
  if (!frames.length) return;
  showFrame(position);
  position = (position + 1) % frames.length;
}

fetchFrames();
setInterval(fetchFrames, REFRESH_MS);
</script>
</body>
</html>
