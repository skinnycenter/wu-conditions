<head>

<title>DAKBoard Reactive Background</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#0a0a0a; overflow:hidden; }
  .layer {
    position:absolute; inset:0;
    background-size:cover; background-position:center; background-repeat:no-repeat;
    opacity:0; transition:opacity 1.6s ease-in-out; will-change:opacity;
  }
  .layer.visible { opacity:1; }
  .vignette {
    position:absolute; inset:0; pointer-events:none;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 18%,
        rgba(0,0,0,0.10) 50%, rgba(0,0,0,0.25) 82%,
        rgba(0,0,0,0.65) 100%),
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 55%, rgba(0,0,0,0.35) 100%);
  }
  .debug {
    position:absolute; left:12px; bottom:12px; max-width:90%;
    color:rgba(255,255,255,0.6); font-size:14px;
    font-family:-apple-system,system-ui,sans-serif; letter-spacing:0.04em;
    text-shadow:0 1px 2px rgba(0,0,0,0.8); display:none;
  }
  body.debug .debug { display:block; }
</style>
</head>

<script>
/* =====================================================================
   DAKBoard Reactive Background v2
   - Pulls station lat/long from PWS metadata on first load
   - Polls every 5 min:
       1. PWS observations  -> ground truth (your roof wins on precip presence)
       2. WU current conditions at station coords -> phrase + lightning
   - Lightning ALWAYS wins. Otherwise:
       PWS dry + WU wet  -> trust PWS (no precip at your house)
       PWS wet + WU phrase -> WU sets type, PWS sets intensity
   - Granular winter: flurries, light_snow, snow, heavy_snow, blizzard,
     freezing_rain, sleet, wintry_mix, hail
   - Crossfades only when resolved key changes
   - ?debug=1 shows live key + raw inputs
   ===================================================================== */

const CONFIG = {
  STATION_ID: "KNYBALLS111",
  WU_API_KEY: "eaH6I4sr",
  POLL_MS: 5 * 60 * 1000,
  IMG_W: 2160,
  IMG_H: 3840,
};

const wuPwsCurrentUrl = () =>
  "https://api.weather.com/v2/pws/observations/current"
  + "?stationId=" + CONFIG.STATION_ID
  + "&format=json&units=e&apiKey=" + CONFIG.WU_API_KEY;

const wuConditionsUrl = (lat, lon) =>
  "https://api.weather.com/v3/wx/observations/current"
  + "?geocode=" + lat + "," + lon
  + "&units=e&language=en-US&format=json&apiKey=" + CONFIG.WU_API_KEY;

function num(v) { if (v==null) return null; const n=+v; return isNaN(n)?null:n; }

function timeBucket(d) {
  const h = d.getHours();
  if (h>=5 && h<8)   return "sunrise";
  if (h>=8 && h<17)  return "day";
  if (h>=17 && h<20) return "sunset";
  return "night";
}
function season(d) {
  const m = d.getMonth();
  if (m===11 || m<=1) return "winter";
  if (m>=2 && m<=4)   return "spring";
  if (m>=5 && m<=7)   return "summer";
  return "autumn";
}

/* ---------- WU phrase -> condition token ---------- */
function phraseToCondition(p) {
  if (!p) return null;
  p = p.toLowerCase();
  if (p.includes("thunder") || p.includes("t-storm") || p.includes("tstm") || p.includes("lightning")) return "lightning";
  if (p.includes("freezing rain") || p.includes("freezing drizzle")) return "freezing_rain";
  if (p.includes("sleet") || p.includes("ice pellets"))              return "sleet";
  if (p.includes("wintry mix") || p.includes("rain and snow") ||
      p.includes("snow and rain") || p.includes("rain/snow"))        return "wintry_mix";
  if (p.includes("blizzard"))                                        return "blizzard";
  if (p.includes("heavy snow"))                                      return "heavy_snow";
  if (p.includes("flurries") || p.includes("flurry"))                return "flurries";
  if (p.includes("light snow") || p.includes("snow shower"))         return "light_snow";
  if (p.includes("snow"))                                            return "snow";
  if (p.includes("heavy rain") || p.includes("downpour"))            return "heavy_rain";
  if (p.includes("light rain") || p.includes("drizzle") || p.includes("light shower")) return "light_rain";
  if (p.includes("rain") || p.includes("shower"))                    return "rain";
  if (p.includes("hail"))                                            return "hail";
  if (p.includes("smoke") || p.includes("wildfire"))                 return "smoke";
  if (p.includes("haze"))                                            return "haze";
  if (p.includes("fog") || p.includes("mist"))                       return "fog";
  if (p.includes("windy") || p.includes("breezy"))                   return "windy";
  if (p.includes("overcast"))                                        return "overcast";
  if (p.includes("mostly cloudy"))                                   return "cloudy";
  if (p.includes("partly cloudy") || p.includes("partly sunny"))     return "partly_cloudy";
  if (p.includes("mostly sunny") || p.includes("mostly clear"))      return "mostly_clear";
  if (p.includes("fair") || p.includes("sunny") || p.includes("clear")) return "clear";
  return null;
}

/* ---------- PWS-only classifier ---------- */
function classifyFromPWS(obs) {
  if (!obs) return "clear";
  const im = obs.imperial || {};
  const rate  = num(im.precipRate)  ?? 0;
  const total = num(im.precipTotal) ?? 0;
  const temp  = num(im.temp);
  const gust  = num(im.windGust)    ?? 0;
  const hum   = num(obs.humidity)   ?? 0;
  const sol   = num(obs.solarRadiation);
  const frozen = temp !== null && temp <= 34;

  if (rate >= 0.30) return frozen ? "heavy_snow" : "heavy_rain";
  if (rate >= 0.10) return frozen ? "snow"       : "rain";
  if (rate >= 0.02) return frozen ? "light_snow" : "light_rain";
  if (total > 0.05 && rate > 0) return frozen ? "flurries" : "light_rain";
  if (gust >= 35) return "windy";
  if (hum >= 92 && (sol === null || sol < 80)) return "fog";

  const h = new Date().getHours();
  const day = h >= 8 && h < 18;
  if (day && sol !== null) {
    if (sol < 150) return "overcast";
    if (sol < 350) return "cloudy";
    if (sol < 600) return "partly_cloudy";
  }
  return "clear";
}

/* ---------- Conflict resolver ---------- */
function resolveCondition(pwsObs, wuCond) {
  if (wuCond === "lightning") return "lightning"; // override

  const pwsCond = classifyFromPWS(pwsObs);
  const PRECIP = ["heavy_rain","rain","light_rain","heavy_snow","snow","light_snow","flurries"];
  const PRECIP_PLUS = PRECIP.concat(["freezing_rain","sleet","wintry_mix","blizzard","hail"]);
  const pwsPrecip = PRECIP.includes(pwsCond);
  const wuPrecip  = wuCond && PRECIP_PLUS.includes(wuCond);

  // PWS dry, WU wet -> trust the roof
  if (!pwsPrecip && wuPrecip) return pwsCond;

  // PWS wet -> WU refines TYPE, PWS sets INTENSITY
  if (pwsPrecip && wuCond) {
    if (["freezing_rain","sleet","wintry_mix","blizzard","hail"].includes(wuCond)) return wuCond;
    if (["heavy_snow","snow","light_snow","flurries"].includes(wuCond)) {
      if (["heavy_snow","snow","light_snow","flurries"].includes(pwsCond)) return pwsCond;
      return pwsCond === "heavy_rain" ? "heavy_snow"
           : pwsCond === "rain"        ? "snow"
           : pwsCond === "light_rain"  ? "light_snow"
           : "flurries";
    }
    return pwsCond; // rain family
  }

  // Both dry -> prefer WU sky-state, else PWS
  if (wuCond && !wuPrecip) return wuCond;
  return pwsCond;
}

function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*16777619)>>>0;}return h;}
function pickQuery(c,t,s){
  const b=QUERIES[c]||QUERIES.clear;
  const list=b[t][s];
  return list[hashStr(c+"|"+t+"|"+s)%list.length];
}

function unsplashUrl(q,bust){
  // Append landscape anchors to bias Unsplash toward wide nature shots
  // and away from close-ups of animals, people, or random objects.
  const anchored = q + " landscape scenery wilderness no people";
  const e=encodeURIComponent(anchored.replace(/\s+/g,","));
  return "https://source.unsplash.com/"+CONFIG.IMG_W+"x"+CONFIG.IMG_H+"/?"+e+"&sig="+bust;
}
function picsumUrl(seed){
  return "https://picsum.photos/seed/"+encodeURIComponent(seed)+"/"+CONFIG.IMG_W+"/"+CONFIG.IMG_H;
}

function preload(url){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(url);
    img.onerror=()=>rej(new Error("img failed: "+url));
    img.src=url;
  });
}

let frontLayer="A";
async function showImage(url){
  await preload(url);
  const a=document.getElementById("layerA"), b=document.getElementById("layerB");
  const showing=frontLayer==="A"?a:b, hidden=frontLayer==="A"?b:a;
  hidden.style.backgroundImage="url('"+url+"')";
  void hidden.offsetWidth;
  hidden.classList.add("visible");
  showing.classList.remove("visible");
  frontLayer=frontLayer==="A"?"B":"A";
}

let stationLatLon=null;
async function getStationLatLon(){
  if (stationLatLon) return stationLatLon;
  try{
    const r=await fetch(wuPwsCurrentUrl(),{cache:"no-store"});
    if (!r.ok) throw new Error("pws "+r.status);
    const d=await r.json();
    const o=d&&d.observations&&d.observations[0];
    if (o && o.lat!=null && o.lon!=null){
      stationLatLon={lat:o.lat,lon:o.lon};
      return stationLatLon;
    }
  }catch(e){console.warn("PWS lat/lon lookup failed:",e);}
  return null;
}

let lastKey=null;
async function tick(){
  const now=new Date();
  const tod=timeBucket(now), sea=season(now);

  // 1. PWS
  let pwsObs=null;
  try{
    const r=await fetch(wuPwsCurrentUrl(),{cache:"no-store"});
    if (r.ok){
      const d=await r.json();
      pwsObs=d&&d.observations&&d.observations[0];
      if (pwsObs && pwsObs.lat!=null && pwsObs.lon!=null){
        stationLatLon={lat:pwsObs.lat,lon:pwsObs.lon};
      }
    }
  }catch(e){console.warn("PWS fetch failed:",e);}

  // 2. WU at station coords
  let wuPhrase="", wuCond=null;
  const loc=stationLatLon||await getStationLatLon();
  if (loc){
    try{
      const r=await fetch(wuConditionsUrl(loc.lat,loc.lon),{cache:"no-store"});
      if (r.ok){
        const d=await r.json();
        wuPhrase=(d&&(d.wxPhraseLong||d.wxPhraseMedium||d.wxPhraseShort))||"";
        wuCond=phraseToCondition(wuPhrase);
      }
    }catch(e){console.warn("WU conditions fetch failed:",e);}
  }

  // 3. Resolve
  const condition=resolveCondition(pwsObs,wuCond);
  const key=condition+"|"+tod+"|"+sea;
  setDebug("key="+key+
    "  |  pws="+(pwsObs?classifyFromPWS(pwsObs):"—")+
    "  |  wu=\""+(wuPhrase||"—")+"\" → "+(wuCond||"—"));

  if (key!==lastKey){
    const q=pickQuery(condition,tod,sea);
    const stamp=Date.now();
    const primary=unsplashUrl(q,stamp);
    const fallback=picsumUrl(key+"-"+stamp);
    try { await showImage(primary); }
    catch {
      try { await showImage(fallback); }
      catch(e){ console.warn("Both image sources failed:",e); }
    }
    lastKey=key;
  }
}

function setDebug(s){
  const el=document.getElementById("debug");
  if (el) el.textContent=s;
}

if (new URLSearchParams(location.search).get("debug")==="1"){
  document.body.classList.add("debug");
}

tick();
setInterval(tick,CONFIG.POLL_MS);
</script>
